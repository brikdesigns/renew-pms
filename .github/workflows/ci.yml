name: CI

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '**.md'
      - 'CLAUDE.md'
      - 'content/**'
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Data integrity gate (PRs to main only) ──
  data-integrity:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
    steps:
      - uses: actions/checkout@v6

      - name: Auth integrity check
        run: ./scripts/auth-health.sh --ci

      - name: Data integrity check
        run: ./scripts/qa-check.sh --ci --data-only

  # ── Code quality + build + E2E ──
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
      PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          # Pinned to match the local CLI version that generated the committed
          # `src/types/database.types.ts`. Bump in lockstep with local upgrades:
          # run `supabase upgrade` locally, `npm run db:gen-types`, then bump
          # this version in the same PR.
          version: 2.90.0

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Schema types drift check
        # Regenerate src/types/database.types.ts from the staging schema and
        # diff against the committed file. Fails if a developer ran a migration
        # without regenerating the TS types — surfaces the bug class that
        # caught us during the 2026-05-03 prod migration (assigned_user_id →
        # assigned_member_id rename).
        run: |
          supabase gen types typescript --project-id "$SUPABASE_STAGING_REF" --schema public > /tmp/regen.types.ts
          if ! diff -q src/types/database.types.ts /tmp/regen.types.ts > /dev/null; then
            echo "::error::src/types/database.types.ts is out of sync with the staging schema."
            echo ""
            echo "Fix locally:"
            echo "  npm run db:gen-types"
            echo "  git add src/types/database.types.ts"
            echo "  git commit -m 'chore(renew): regenerate Supabase types'"
            echo ""
            echo "Diff (committed → staging):"
            diff src/types/database.types.ts /tmp/regen.types.ts || true
            exit 1
          fi
          echo "Types match staging schema."

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        env:
          CI: true
        run: |
          npm run start &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 1
          done
          npx playwright test tests/e2e/auth

  # ── Lighthouse CI (perf regression gate, PRs only) ──
  # Warns on regressions today (assertions: warn). Tighten to error after
  # ~2 weeks of baseline data. Tests /login only — public, on the critical
  # entry path, no auth setup required. Add more URLs once we wire test auth.
  lighthouse:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lhci

      - name: Upload Lighthouse report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-report
          path: .lighthouseci/
          retention-days: 14
