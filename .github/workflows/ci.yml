name: CI

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '**.md'
      - 'CLAUDE.md'
      - 'content/**'
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Data integrity gate (PRs to main only) ──
  data-integrity:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_STAGING_REF: ${{ secrets.SUPABASE_STAGING_REF }}
    steps:
      - uses: actions/checkout@v6

      - name: Auth integrity check
        run: ./scripts/auth-health.sh --ci

      - name: Data integrity check
        run: ./scripts/qa-check.sh --ci --data-only

  # ── Code quality + build + E2E ──
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        env:
          CI: true
        run: |
          npm run start &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 1
          done
          npx playwright test tests/e2e/auth

  # ── Lighthouse CI (perf regression gate, PRs only) ──
  # Warns on regressions today (assertions: warn). Tighten to error after
  # ~2 weeks of baseline data. Tests /login only — public, on the critical
  # entry path, no auth setup required. Add more URLs once we wire test auth.
  lighthouse:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lhci

      - name: Upload Lighthouse report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-report
          path: .lighthouseci/
          retention-days: 14
