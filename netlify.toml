[build]
  # Remove stale brik-bds submodule dir (cached from pre-npm-migration builds)
  command = "rm -rf brik-bds && npm run build"
  publish = ".next"
  ignore = "if [ -z \"$CACHED_COMMIT\" ]; then exit 1; fi; git diff --quiet $CACHED_COMMIT HEAD -- src/ public/ next.config.mjs package.json package-lock.json netlify.toml"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Standalone Netlify functions live alongside the Next.js app — used for
# scheduled (cron) work that runs without a user session. The Next.js app
# is published from `.next` per the [build] block above; this directory is
# discovered separately by Netlify.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Staging (branch deploys) ────────────────────────────────────────
# main     → renew-pms.netlify.app  (production, custom domain TBD)
# staging  → staging--renew-pms.netlify.app
# PR #N    → deploy-preview-N--renew-pms.netlify.app

[context.staging]
  # Remove stale brik-bds submodule dir (cached from pre-npm-migration builds)
  command = "rm -rf brik-bds && npm run build"

[context.staging.environment]
  NEXT_PUBLIC_SITE_URL = "https://staging--renew-pms.netlify.app"

[context.deploy-preview]
  # Remove stale brik-bds submodule dir (cached from pre-npm-migration builds)
  command = "rm -rf brik-bds && npm run build"
