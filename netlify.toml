[build]
  # Remove stale brik-bds submodule dir (cached from pre-npm-migration builds)
  command = "rm -rf brik-bds && npm run build"
  publish = ".next"
  ignore = "if [ -z \"$CACHED_COMMIT\" ]; then exit 1; fi; git diff --quiet $CACHED_COMMIT HEAD -- src/ public/ next.config.mjs package.json package-lock.json netlify.toml"

[build.environment]
  NODE_VERSION = "20"
  # The Claude Code hook test harness contains synthetic secret-shaped strings
  # (fake github_pat_*, xoxb-*, sk-ant-* values) used to verify the scanner blocks them.
  # Netlify's own secret-scanning would otherwise flag these test fixtures.
  SECRETS_SCAN_OMIT_PATHS = "scripts/test-claude-hooks.sh"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Standalone Netlify functions live alongside the Next.js app — used for
# scheduled (cron) work that runs without a user session. The Next.js app
# is published from `.next` per the [build] block above; this directory is
# discovered separately by Netlify.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Staging (branch deploys) ────────────────────────────────────────
# main     → renew-pms.netlify.app  (production, custom domain TBD)
# staging  → staging--renew-pms.netlify.app
# PR #N    → deploy-preview-N--renew-pms.netlify.app
#
# NEXT_PUBLIC_DEPLOY_ENVIRONMENT is read by Sentry instrumentation
# (instrumentation.ts + instrumentation-client.ts) to tag events with
# the correct environment. Mirrors Netlify's CONTEXT env var, but
# NEXT_PUBLIC_-prefixed so it's inlined into the client bundle.

[context.production.environment]
  NEXT_PUBLIC_DEPLOY_ENVIRONMENT = "production"

[context.staging]
  # Remove stale brik-bds submodule dir (cached from pre-npm-migration builds)
  command = "rm -rf brik-bds && npm run build"

[context.staging.environment]
  NEXT_PUBLIC_SITE_URL = "https://staging--renew-pms.netlify.app"
  NEXT_PUBLIC_DEPLOY_ENVIRONMENT = "staging"

[context.deploy-preview]
  # Remove stale brik-bds submodule dir (cached from pre-npm-migration builds)
  command = "rm -rf brik-bds && npm run build"

[context.deploy-preview.environment]
  NEXT_PUBLIC_DEPLOY_ENVIRONMENT = "preview"
